---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jellyfin
  namespace: media-hosting
spec:
  interval: 15m
  url: https://jellyfin.github.io/jellyfin-helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: media-hosting
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: jellyfin
      version: "2.7.*"
      sourceRef:
        kind: HelmRepository
        name: jellyfin
      interval: 5m
  releaseName: jellyfin
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    replicaCount: 1

    image:
      pullPolicy: IfNotPresent

    persistence:
      config:
        enabled: true
        size: 5Gi
        storageClass: "nfs-csi"
      media:
        enabled: true
        existingClaim: "media-generic-pvc"

    ingress:
      enabled: false

    resources:
      limits:
        cpu: 2000m
        memory: 4Gi
        gpu.intel.com/i915: 1
      requests:
        cpu: 500m
        memory: 500Mi
    
    service:
      type: LoadBalancer
      ports:
      - name: jellyfin
        port: 8096
        targetPort: 8096


    nodeSelector: {}
    tolerations: []
    affinity: {}
    securityContext:
      privileged: true

    extraVolumes:
      - name: dri
        hostPath:
          path: /dev/dri

    extraVolumeMounts:
      - name: dri
        mountPath: /dev/dri
