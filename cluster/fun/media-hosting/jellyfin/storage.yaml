---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-generic-pv
  namespace: mediaStore
  labels:
    store: mediaStore
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
  capacity:
    storage: 8Ti
  nfs:
    server: 192.168.7.155
    path: /mnt/main/media
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-generic-pvc
  namespace: media-hosting
spec:
  selector:
    matchLabels:
      store: mediaStore
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 8Ti