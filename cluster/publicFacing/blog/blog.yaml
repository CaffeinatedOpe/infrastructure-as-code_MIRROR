apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-deployment
  namespace: blog
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blog
  template:
    metadata:
      labels:
        app: blog
    spec:
      containers:
      - name: blog
        image: ghcr.io/caffeinatedope/blog:latest@sha256:99c5773f61f20f3699d17e7a8c8f4eef70c95c74a42a3ffee55992710018a096 # {"$imagepolicy": "blog:blog-imagepolicy"}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4321
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-static-deployment
  namespace: blog
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blog
  template:
    metadata:
      labels:
        app: blog
    spec:
      containers:
      - name: blog-static
        image: nginx
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        volumeMounts:
        - mountPath: "/usr/share/nginx/html"
          name: blog-pvc
        - name: nginx-config
          mountPath: /etc/nginx/
      volumes:
      - name: blog-pvc
        persistentVolumeClaim:
          claimName: blog-static-storage
      - name: nginx-config
        configMap:
          name: blog-static-configmap