apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-deployment
  namespace: blog
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blog
  template:
    metadata:
      labels:
        app: blog
    spec:
      containers:
      - name: blog
        image: ghcr.io/caffeinatedope/blog:latest@sha256:a77913a468c3657e756acfcd8d7e17ac86d4d8c0c838e7f388df08cfa0fb91a5 # {"$imagepolicy": "blog:blog-imagepolicy"}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4321
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-static-deployment
  namespace: blog
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blog-static
  template:
    metadata:
      labels:
        app: blog-static
    spec:
      containers:
      - name: blog-static
        image: nginx
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4242
        volumeMounts:
        - mountPath: "/var/www/html"
          name: blog-pvc
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: blog-pvc
        nfs:
          server: 192.168.7.155
          path: /mnt/main/blog-data
      - name: nginx-config
        configMap:
          name: blog-static-configmap
