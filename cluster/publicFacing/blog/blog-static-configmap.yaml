apiVersion: v1
data:
  nginx.conf: |
    worker_processes  1;
    events {
        worker_connections  1024;
    }
    
    
    http {
        include       mime.types;
        default_type  application/octet-stream;
        sendfile        on;
        keepalive_timeout  65;
    
        server {
            listen 80;
            server_name static.caffeinatedope.net;
            location / {
              root /var/www/html;  # Directory containing static files
              try_files $uri $uri/ =404;  # Serve 404 if file not found
            }
          }
        }
    }
kind: ConfigMap
metadata:
  name: blog-static-configmap
  namespace: blog