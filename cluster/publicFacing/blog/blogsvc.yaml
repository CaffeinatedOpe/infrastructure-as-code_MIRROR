---
apiVersion: v1
kind: Service
metadata:
  name: blog-service
  namespace: blog
spec:
  type: LoadBalancer
  selector:
    app: blog
  ports:
  - port: 4321
    targetPort: 4321
---
apiVersion: v1
kind: Service
metadata:
  name: blog-static-service
  namespace: blog
spec:
  type: LoadBalancer
  selector:
    app: blog-static
  ports:
  - port: 424242
    targetPort: 424242