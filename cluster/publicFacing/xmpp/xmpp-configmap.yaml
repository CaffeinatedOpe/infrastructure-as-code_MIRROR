apiVersion: v1
kind: ConfigMap
metadata:
  name: xmpp-configmap
  namespace: xmpp
data:
  config.dist: |
    admins = { "caffeinatedope" }
    allow_registration = true
    registration_invite_only = false
    external_addresses = { "178.156.246.91" } 
    
    Component "conference.xmpp.caffeinatedope.net" "muc"
    Component "upload.xmpp.caffeinatedope.net" "http_file_share"
    name = "chatroom"
    max_history_messages = 100