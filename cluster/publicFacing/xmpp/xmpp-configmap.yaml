apiVersion: v1
kind: ConfigMap
metadata:
  name: xmpp-configmap
  namespace: xmpp
data:
  config.dist: |
    admins = { caffeinatedope }
    allow_registration = true -- Allow users to register new accounts
  
    -- This option allows you to specify additional locations where Prosody
    -- will search first for modules. For additional modules you can install, see
    -- the community module repository at https://modules.prosody.im/
    --plugin_paths = {}
  
    -- This is the list of modules Prosody will load on startup.
    -- Documentation for bundled modules can be found at: https://prosody.im/doc/modules
    modules_enabled = {
  
        -- Generally required
            "disco"; -- Service discovery
            "roster"; -- Allow users to have a roster. Recommended ;)
            "saslauth"; -- Authentication for clients and servers. Recommended if you want to log in.
            "tls"; -- Add support for secure TLS on c2s/s2s connections
  
        -- Not essential, but recommended
            "blocklist"; -- Allow users to block communications with other users
            "bookmarks"; -- Synchronise the list of open rooms between clients
            "carbons"; -- Keep multiple online clients in sync
            "dialback"; -- Support for verifying remote servers using DNS
            "limits"; -- Enable bandwidth limiting for XMPP connections
            "pep"; -- Allow users to store public and private data in their account
            "private"; -- Legacy account storage mechanism (XEP-0049)
            "smacks"; -- Stream management and resumption (XEP-0198)
            "vcard4"; -- User profiles (stored in PEP)
            "vcard_legacy"; -- Conversion between legacy vCard and PEP Avatar, vcard
  
        -- Nice to have
            "csi_simple"; -- Simple but effective traffic optimizations for mobile devices
            "invites"; -- Create and manage invites
            "invites_adhoc"; -- Allow admins/users to create invitations via their client
            "invites_register"; -- Allows invited users to create accounts
            "ping"; -- Replies to XMPP pings with pongs
            "register"; -- Allow users to register on this server using a client and change passwords
            "time"; -- Let others know the time here on this server
            "uptime"; -- Report how long server has been running
            "version"; -- Replies to server version requests
            --"mam"; -- Store recent messages to allow multi-device synchronization
            --"turn_external"; -- Provide external STUN/TURN service for e.g. audio/video calls
  
        -- Admin interfaces
            "admin_adhoc"; -- Allows administration via an XMPP client that supports ad-hoc commands
            "admin_shell"; -- Allow secure administration via 'prosodyctl shell'
  
        -- HTTP modules
            --"bosh"; -- Enable BOSH clients, aka "Jabber over HTTP"
            --"http_openmetrics"; -- for exposing metrics to stats collectors
            --"websocket"; -- XMPP over WebSockets
  
        -- Other specific functionality
            --"announce"; -- Send announcement to all online users
            --"groups"; -- Shared roster support
            --"legacyauth"; -- Legacy authentication. Only used by some old clients and bots.
            --"mimicking"; -- Prevent address spoofing
            "motd"; -- Send a message to users when they log in
            --"proxy65"; -- Enables a file transfer proxy service which clients behind NAT can use
            --"s2s_bidi"; -- Bi-directional server-to-server (XEP-0288)
            --"server_contact_info"; -- Publish contact information for this service
            --"tombstones"; -- Prevent registration of deleted accounts
            --"watchregistrations"; -- Alert admins of registrations
            "welcome"; -- Welcome users who register accounts
    }
    motd_text = [[ Let's all love Lain ]]
  
    -- These modules are auto-loaded, but should you want
    -- to disable them then uncomment them here:
    modules_disabled = {
        -- "offline"; -- Store offline messages
        -- "c2s"; -- Handle client connections
        -- "s2s"; -- Handle server-to-server connections
        -- "posix"; -- POSIX functionality, sends server to background, etc.
    }
    s2s_secure_auth = true
    --s2s_secure_domains = { "jabber.org" }
    limits = {
        c2s = {
            rate = "10kb/s";
        };
        s2sin = {
            rate = "30kb/s";
        };
    }
    authentication = "internal_hashed"
    archive_expires_after = "1w" -- Remove archived messages after 1 week
    log = {
        info = "prosody.log"; -- Change 'info' to 'debug' for verbose logging
        error = "prosody.err";
        -- "*syslog"; -- Uncomment this for logging to syslog
        -- "*console"; -- Log to the console, useful for debugging when running in the foreground
    }