apiVersion: apps/v1
kind: Deployment
metadata:
  name: prosody-deployment
  labels:
    app: prosody
  namespace: xmpp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prosody
  template:
    metadata:
      labels:
        app: prosody
    spec:
      containers:
      - name: prosody
        image: prosodyim/prosody:13.0
        ports:
        - containerPort: 5222
        envFrom:
          - configMapRef:
              name: xmpp-configmap
      - name: ts-sidecar
        imagePullPolicy: Always
        image: "ghcr.io/tailscale/tailscale:latest"
        env:
        - name: TS_KUBE_SECRET
          value: "tailscale-auth"
        - name: TS_USERSPACE
          value: "false"
        - name: TS_DEBUG_FIREWALL_MODE
          value: auto
        - name: TS_AUTHKEY
          valueFrom:
            secretKeyRef:
              name: tailscale-auth
              key: TS_AUTHKEY
              optional: false
        - name: TS_EXTRA_ARGS
          value: "--login-server=https://headscale.caffeinatedope.net --advertise-exit-node"
        - name: POD_NAME
          value: prosody
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        securityContext:
          privileged: true