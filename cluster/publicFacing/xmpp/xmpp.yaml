apiVersion: apps/v1
kind: Deployment
metadata:
  name: prosody-deployment
  labels:
    app: prosody
  namespace: xmpp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prosody
  template:
    metadata:
      labels:
        app: prosody
    spec:
      containers:
      - name: prosody
        image: prosodyim/prosody
        ports:
        - containerPort: 5222
        envFrom:
          - configMapRef:
              name: xmpp-configmap