---
apiVersion: v1
kind: Namespace
metadata:
  name: storage
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: storage
  namespace: storage
spec:
  interval: 5m
  path: ./cluster/management/storage
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: flux-system