---
apiVersion: v1
kind: Namespace
metadata:
  name: media-hosting
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: jellyfin
  namespace: media-hosting
spec:
  interval: 5m
  path: ./cluster/fun/media-hosting/jellyfin
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: flux-system