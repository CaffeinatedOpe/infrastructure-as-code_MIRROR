---
# Namespace for CSI driver
apiVersion: v1
kind: Namespace
metadata:
  name: truenas-csi
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: truenas-csi
  namespace: truenas-csi
spec:
  interval: 10m0s
  path: ./cluster/management/truenas-csi
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: flux-system