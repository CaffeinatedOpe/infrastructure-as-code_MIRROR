---
apiVersion: v1
kind: Namespace
metadata:
  name: blog
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: blog
  namespace: blog
spec:
  interval: 5m
  path: ./cluster/blog
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: flux-system