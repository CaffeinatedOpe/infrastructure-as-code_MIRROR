---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: cert-manager
  interval: 5m
  path: ./cluster/cert-manager/controller
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: certs
  namespace: cert-manager
spec:
  dependsOn:
    - name: cert-manager
  interval: 5m
  path: ./cluster/cert-manager/certs
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system