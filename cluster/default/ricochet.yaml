---
apiVersion: v1
kind: Namespace
metadata:
  name: ricochet
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ricochet
  namespace: ricochet
spec:
  interval: 5m
  path: ./cluster/public-facing/ricochet
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: flux-system