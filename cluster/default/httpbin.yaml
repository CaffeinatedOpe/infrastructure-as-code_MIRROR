---
apiVersion: v1
kind: Namespace
metadata:
  name: httpbin
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: httpbin
  namespace: httpbin
spec:
  interval: 10m0s
  path: ./cluster/httpbin
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: flux-system