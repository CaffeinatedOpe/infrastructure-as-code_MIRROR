---
apiVersion: v1
kind: Namespace
metadata:
  name: reloader
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: reloader
  namespace: reloader
spec:
  interval: 5m
  path: ./cluster/management/reloader
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: flux-system