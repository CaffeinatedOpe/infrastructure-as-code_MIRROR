---
apiVersion: v1
kind: Namespace
metadata:
  name: cloudpg
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudpg
  namespace: cloudpg
spec:
  interval: 5m
  path: ./cluster/management/cloudpg
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: flux-system