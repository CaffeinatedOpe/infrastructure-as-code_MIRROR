---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: csi-driver-nfs
  namespace: storage
spec:
  interval: 24h
  url: https://raw.githubusercontent.com/kubernetes-csi/csi-driver-nfs/master/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubernetes-nfs-driver
  namespace: storage
spec:
  interval: 5m
  chart:
    spec:
      chart: csi-driver-nfs
      version: 4.13.*
      sourceRef:
        kind: HelmRepository
        name: csi-driver-nfs
      interval: 5m
  releaseName: csi-driver-nfs
  targetNamespace: storage
  install:
    disableWait: true
  upgrade:
    disableWait: true

