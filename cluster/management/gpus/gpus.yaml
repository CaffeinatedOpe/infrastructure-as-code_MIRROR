---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nfd
  namespace: gpus
spec:
  interval: 24h
  url: https://kubernetes-sigs.github.io/node-feature-discovery/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-feature-discovery
  namespace: gpus
spec:
  interval: 5m
  chart:
    spec:
      chart: node-feature-discovery
      version: 0.18.*
      sourceRef:
        kind: HelmRepository
        name: nfd
      interval: 5m
  releaseName: node-feature-discovery
  targetNamespace: gpus
  install:
    disableWait: true
  upgrade:
    disableWait: true
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-plugin
  namespace: gpus
spec:
  interval: 5m
  chart:
    spec:
      chart: intel-device-plugins-gpu
      version: '*'
      sourceRef:
        kind: HelmRepository
        name: intel-operator
      interval: 5m
  releaseName: intel-device-plugins-gpu
  targetNamespace: gpus
  install:
    disableWait: true
  upgrade:
    disableWait: true
  values:
    nodeFeatureRule: true