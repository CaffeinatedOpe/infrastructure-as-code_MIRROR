---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: intel-operator
  namespace: gpus
spec:
  interval: 24h
  url: https://intel.github.io/helm-charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-operator
  namespace: gpus
spec:
  interval: 5m
  chart:
    spec:
      chart: intel-device-plugins-operator
      version: '*'
      sourceRef:
        kind: HelmRepository
        name: intel-operator
      interval: 5m
  releaseName: intel-device-plugins-operator
  targetNamespace: gpus
  install:
    disableWait: true
  upgrade:
    disableWait: true